modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://minecraft.curseforge.com/projects/slashblade"
logoFile="slashblade.png"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="slashblade.mixins.json"

[[mixins]]
config="slashblade.thetwilightforest.mixins.json"

[[mixins]]
config="slashblade.patchouli.mixins.json"

[[mixins]]
config="slashblade.emi.mixins.json"

[[mixins]]
config="slashblade.ar.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="apotheosis"
    type="optional"
    versionRange="[0.0.0,)"
    ordering="AFTER"
    side="BOTH"
